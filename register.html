<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusFest | Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="index.html">CampusFest</a>
            <div class="navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link active" href="register.html">Registration</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 650px;">
        <div class="card shadow border-0">
            <div class="card-header bg-danger text-white text-center py-3">
                <h3 class="mb-0 fw-bold">Event Registration Portal</h3>
            </div>
            <div class="card-body p-4">

                <div id="submissionAlert" class="alert alert-success alert-dismissible fade show d-none" role="alert">
                    <strong>Success!</strong> Your registration token has been recorded. Show your campus ID badge at the event venue gate for entry.
                    <button type="button" class="btn-close" onclick="dismissBox()"></button>
                </div>

                <form id="eventRegForm" onsubmit="processForm(event)">
                    <div class="mb-3">
                        <label class="form-label">Student Full Name *</label>
                        <input type="text" class="form-control" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">University Roll Number *</label>
                            <input type="text" class="form-control" placeholder="e.g., 23B81AXXXX" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Academic Branch *</label>
                            <input type="text" class="form-control" placeholder="e.g., CSE / ECE / MECH" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email Address *</label>
                            <input type="email" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Mobile Number *</label>
                            <input type="tel" class="form-control" required pattern="[0-9]{10}" title="Enter a valid 10-digit mobile number">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Select Event Track *</label>
                        <select class="form-select" required>
                            <option value="" selected disabled>Choose your event category...</option>
                            <option>Technical Quiz</option>
                            <option>36-Hour Hackathon</option>
                            <option>Poster Presentation</option>
                            <option>Speed Coding Contest</option>
                            <option>Project Expo</option>
                            <option>Mega Cultural Fest</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-danger w-100 py-2 fw-bold shadow-sm">Complete Fest Registration</button>
                </form>

            </div>
        </div>
    </div>

    <script>
        function processForm(event) {
            event.preventDefault();
            document.getElementById('submissionAlert').classList.remove('d-none');
            document.getElementById('eventRegForm').reset();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
        function dismissBox() {
            document.getElementById('submissionAlert').classList.add('d-none');
        }
    </script>

</body>
</html>
